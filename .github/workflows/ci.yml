name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 1. Installs Vercel CLI immediately
      - name: Install Vercel CLI
        run: npm install --global vercel

      # 2. Pulls environment information directly into apps/web/.env.local
      - name: Pull Vercel Environment Information
        working-directory: apps/web
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            vercel env pull .env.local --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel env pull .env.local --environment=preview --yes --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 3. Clean install all dependencies with env context ready
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: apps/web
        run: npm run test

      - name: Build
        working-directory: apps/web
        run: npm run build