<script>
        // Mood selection logic
        const moodButtons = document.querySelectorAll('.mood-btn');
        moodButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                moodButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Haptic feedback simulation
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = 'scale(1)', 100);
            });
        });

        // Character count logic
        const textarea = document.getElementById('circle-note');
        const countDisplay = document.getElementById('char-count');
        
        textarea.addEventListener('input', (e) => {
            const count = e.target.value.length;
            countDisplay.textContent = `${count}/140`;
            
            if (count >= 130) {
                countDisplay.classList.add('text-error');
            } else {
                countDisplay.classList.remove('text-error');
            }
        });

        // Simple button active state visual feedback
        const primaryBtn = document.querySelector('button[type="button"].bg-[#FFBF00]');
        primaryBtn.addEventListener('mousedown', () => {
            primaryBtn.style.transform = 'scale(0.98)';
        });
        primaryBtn.addEventListener('mouseup', () => {
            primaryBtn.style.transform = 'scale(1)';
        });
    </script>
