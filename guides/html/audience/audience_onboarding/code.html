<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..900&amp;family=Plus+Jakarta+Sans:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .option-card.selected {
      border-color: #0f6e56; /* primary-container */
      background-color: #e1f5ee; /* primary-light custom logic */
    }
    body {
      background-color: #F5F3EF;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-error-container": "#93000a",
                  "primary-fixed-dim": "#84d6b9",
                  "surface": "#fcf9f8",
                  "tertiary": "#00543f",
                  "on-tertiary-fixed-variant": "#00513d",
                  "error-container": "#ffdad6",
                  "secondary-fixed-dim": "#ffb870",
                  "on-background": "#1c1b1b",
                  "error": "#ba1a1a",
                  "primary-fixed": "#a0f3d4",
                  "primary-container": "#0f6e56",
                  "secondary-fixed": "#ffdcbe",
                  "surface-container": "#f0eded",
                  "outline-variant": "#bec9c3",
                  "outline": "#6f7a74",
                  "secondary": "#88520e",
                  "on-tertiary-container": "#85f1ca",
                  "surface-tint": "#086b53",
                  "on-primary-fixed-variant": "#00513e",
                  "on-primary-container": "#9aedcf",
                  "inverse-primary": "#84d6b9",
                  "on-secondary-fixed-variant": "#693c00",
                  "on-secondary-container": "#774400",
                  "surface-dim": "#dcd9d9",
                  "primary": "#005440",
                  "surface-container-high": "#eae7e7",
                  "on-error": "#ffffff",
                  "on-secondary-fixed": "#2d1600",
                  "tertiary-fixed-dim": "#6edab4",
                  "tertiary-container": "#006f54",
                  "on-surface": "#1c1b1b",
                  "on-secondary": "#ffffff",
                  "secondary-container": "#feb56b",
                  "surface-container-highest": "#e5e2e1",
                  "tertiary-fixed": "#8af7cf",
                  "on-tertiary-fixed": "#002117",
                  "on-primary": "#ffffff",
                  "surface-bright": "#fcf9f8",
                  "on-tertiary": "#ffffff",
                  "on-surface-variant": "#3f4944",
                  "on-primary-fixed": "#002117",
                  "surface-container-low": "#f6f3f2",
                  "surface-variant": "#e5e2e1",
                  "surface-container-lowest": "#ffffff",
                  "background": "#fcf9f8",
                  "inverse-surface": "#313030",
                  "inverse-on-surface": "#f3f0ef"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "md": "24px",
                  "margin-mobile": "16px",
                  "xs": "4px",
                  "xl": "80px",
                  "sm": "12px",
                  "gutter": "24px",
                  "lg": "48px",
                  "margin-desktop": "64px",
                  "base": "8px"
          },
          "fontFamily": {
                  "headline-lg-mobile": ["Plus Jakarta Sans"],
                  "headline-lg": ["Plus Jakarta Sans"],
                  "label-mono": ["JetBrains Mono"],
                  "headline-md": ["Plus Jakarta Sans"],
                  "body-lg": ["Plus Jakarta Sans"],
                  "body-md": ["Plus Jakarta Sans"],
                  "caption": ["Plus Jakarta Sans"],
                  "headline-xl": ["Plus Jakarta Sans"]
          },
          "fontSize": {
                  "headline-lg-mobile": ["28px", {"lineHeight": "1.3", "fontWeight": "700"}],
                  "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                  "label-mono": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "500"}],
                  "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                  "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "caption": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                  "headline-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile">
<!-- Main Card Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant p-lg flex flex-col items-center">
<!-- Branding Header -->
<div class="mb-lg text-center">
<h1 class="font-headline-md text-headline-md text-primary mb-base">What brings you here?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Helps us show you the most relevant artists.</p>
</div>
<!-- Selection Grid -->
<div class="w-full space-y-md mb-xl" id="options-container">
<!-- Option 1 -->
<button class="option-card w-full flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-low transition-all duration-200 hover:border-primary-container group text-left" onclick="selectOption(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-primary-fixed text-on-primary-fixed group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="confirmation_number">confirmation_number</span>
</div>
<div class="flex-1">
<span class="block font-headline-md text-body-lg text-on-surface">Booking for an event</span>
<span class="block font-caption text-caption text-on-surface-variant">Professional gigs &amp; large venues</span>
</div>
<div class="selection-indicator opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2 -->
<button class="option-card w-full flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-low transition-all duration-200 hover:border-primary-container group text-left" onclick="selectOption(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-tertiary-fixed text-on-tertiary-fixed group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</div>
<div class="flex-1">
<span class="block font-headline-md text-body-lg text-on-surface">Private occasion</span>
<span class="block font-caption text-caption text-on-surface-variant">Intimate gatherings &amp; celebrations</span>
</div>
<div class="selection-indicator opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="option-card w-full flex items-center gap-md p-md rounded-lg border border-outline-variant bg-surface-container-low transition-all duration-200 hover:border-primary-container group text-left" onclick="selectOption(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-secondary-fixed text-on-secondary-fixed group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
</div>
<div class="flex-1">
<span class="block font-headline-md text-body-lg text-on-surface">Just browsing</span>
<span class="block font-caption text-caption text-on-surface-variant">Exploring East African artistry</span>
</div>
<div class="selection-indicator opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Actions -->
<div class="w-full space-y-md text-center">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-md py-md rounded-lg shadow-sm hover:shadow-md active:scale-95 transition-all duration-150">
        Continue
      </button>
<button class="text-on-surface-variant font-label-mono text-label-mono hover:text-primary transition-colors py-xs">
        Skip for now
      </button>
</div>
</main>
<!-- Atmospheric Background Visuals (Non-obstructive) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed filter blur-[80px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] rounded-full bg-secondary-fixed filter blur-[100px]"></div>
</div>
<script>
    function selectOption(element) {
      // Remove selected class from all cards
      const allCards = document.querySelectorAll('.option-card');
      allCards.forEach(card => {
        card.classList.remove('selected', 'bg-primary-fixed-dim', 'border-primary-container');
        card.querySelector('.selection-indicator').classList.add('opacity-0');
      });

      // Add selected class to the clicked card
      element.classList.add('selected', 'border-primary-container');
      element.style.backgroundColor = '#E1F5EE'; // Soft teal tint
      element.querySelector('.selection-indicator').classList.remove('opacity-0');
      
      // Add a small scale bump for feedback
      element.classList.add('scale-[1.02]');
      setTimeout(() => {
        element.classList.remove('scale-[1.02]');
      }, 150);
    }
  </script>
</body></html>
